<section class="skills section-block" id="skills" [appSectionAnchor]="'skills'">
  <div class="section-shell">
    <app-section-header
      [titleStart]="content.titleStart"
      [accentWord]="content.accentWord"
      [titleEnd]="content.titleEnd"
      [description]="content.description"
    />

    <div class="skills__inner">
      <!-- "Borrow the light": a glass jar of skills disguised as fireflies.
           Hover or focus one and it glows brighter and names itself. -->
      <figure class="skills__scene" appScrollReveal [revealDelay]="120">
        <div class="skills__stars" aria-hidden="true"></div>
        <div class="jar">
          <div class="jar__mouth" aria-hidden="true"></div>
          <div class="jar__collar" aria-hidden="true"></div>
          <div class="jar__body">
            <div class="jar__glow" aria-hidden="true"></div>
            @for (skill of content.jar.items; track skill.label; let i = $index) {
              <span
                class="jar__firefly"
                tabindex="0"
                role="img"
                [attr.aria-label]="skill.label"
                [style.--fi]="i"
              >
                <svg
                  class="jar__firefly-icon"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="1.5"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  aria-hidden="true"
                >
                  @switch (skill.icon) {
                    @case ('angular') {
                      <path d="M12 2 2.5 5.5 4 18.5 12 22l8-3.5L21.5 5.5z" />
                      <path d="M8.2 16 12 6.8 15.8 16" />
                      <path d="M9.7 13h4.6" />
                    }
                    @case ('typescript') {
                      <rect x="3" y="3" width="18" height="18" rx="3" />
                      <path d="M7.5 10h5M10 10v7" />
                      <path d="M17 10.6c-.6-.7-2.6-1-2.6.9 0 1.7 3 1 3 3 0 1.8-2.2 1.7-3.1.8" />
                    }
                    @case ('rxjs') {
                      <path d="M3 12h15" />
                      <path d="M15.5 8.5 19 12l-3.5 3.5" />
                      <circle cx="7" cy="12" r="1.7" fill="currentColor" stroke="none" />
                      <circle cx="12" cy="12" r="1.7" fill="currentColor" stroke="none" />
                    }
                    @case ('sass') {
                      <path
                        d="M17 5.5c-4.5-2.6-10.5.2-10 4 .4 3.4 8.5 2.3 8.5 6.5 0 3-4.5 4.6-8.5 2.5"
                      />
                    }
                    @case ('jest') {
                      <circle cx="12" cy="12" r="9" />
                      <path d="m8 12.5 2.8 2.8L16 9.5" />
                    }
                    @case ('playwright') {
                      <path
                        d="M5 4.5C7.4 6 9.8 6 12 5c2.2 1 4.6 1 7-.5V12c0 5-3 8.5-7 8.5S5 17 5 12z"
                      />
                      <path d="M8.5 10.7c.5-.8 1.5-.8 2 0M13.5 10.7c.5-.8 1.5-.8 2 0" />
                      <path d="M9 14.5c1.8 1.5 4.2 1.5 6 0" />
                    }
                    @case ('git') {
                      <line x1="6" y1="3" x2="6" y2="15" />
                      <circle cx="18" cy="6" r="3" />
                      <circle cx="6" cy="18" r="3" />
                      <path d="M18 9a9 9 0 0 1-9 9" />
                    }
                    @case ('html') {
                      <path d="m8 8-4 4 4 4" />
                      <path d="m16 8 4 4-4 4" />
                      <path d="M13.5 5 10.5 19" />
                    }
                    @case ('tailwind') {
                      <path
                        d="M4 10.5c1.5-3 3.6-4.5 6.2-4.5 3.4 0 3.9 2.4 5.8 2.9 1.3.3 2.6-.1 4-1.4-1.5 3-3.6 4.5-6.2 4.5-3.4 0-3.9-2.4-5.8-2.9-1.3-.3-2.6.1-4 1.4z"
                      />
                      <path
                        d="M4 17c1.5-3 3.6-4.5 6.2-4.5 3.4 0 3.9 2.4 5.8 2.9 1.3.3 2.6-.1 4-1.4-1.5 3-3.6 4.5-6.2 4.5-3.4 0-3.9-2.4-5.8-2.9-1.3-.3-2.6.1-4 1.4z"
                      />
                    }
                  }
                </svg>
                <span class="jar__firefly-label mono-label">{{ skill.label }}</span>
              </span>
            }
          </div>
        </div>
        <figcaption class="skills__scene-caption mono-label">{{ content.jar.caption }}</figcaption>
      </figure>

      <div class="skills__content">
        <div class="skills__groups">
          @for (group of content.groups; track group.name; let i = $index) {
            <article class="skills__group" appScrollReveal [revealDelay]="i * 90">
              <h3 class="skills__group-name">{{ group.name }}</h3>
              <div class="skills__badges">
                @for (skill of group.items; track skill) {
                  <app-tech-badge [label]="skill" />
                }
              </div>
            </article>
          }
        </div>

        <div class="skills__learning" appScrollReveal [revealDelay]="240">
          <p class="mono-label">{{ content.learningLabel }}</p>
          <div class="skills__badges">
            @for (item of content.learning; track item) {
              <app-tech-badge [label]="item" tone="muted" />
            }
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
