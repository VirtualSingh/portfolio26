<section class="hero" id="hero" [appSectionAnchor]="'hero'">
  <div class="hero__copy">
    <p class="hero__greeting hero__animate">{{ greeting }}</p>
    <h1 class="hero__name hero__animate">
      {{ firstName }}<br />
      <em class="accent-word">{{ lastName }}</em>
    </h1>

    <div class="hero__role hero__animate">
      <span class="visually-hidden">{{ roles.join(', ') }}</span>
      <span aria-hidden="true">{{ currentRole() }}</span>
      <span class="hero__caret" aria-hidden="true"></span>
    </div>

    <p class="hero__tagline hero__animate">{{ tagline }}</p>

    <div class="hero__actions hero__animate">
      <a class="button-primary" [href]="resume.url" [attr.download]="resume.fileName">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <path d="m7 10 5 5 5-5"/>
          <path d="M12 15V3"/>
        </svg>
        {{ resume.label }}
      </a>
      <button type="button" class="button-secondary" (click)="scrollTo('contact')">Get in touch</button>
    </div>

    <p class="hero__proof mono-label hero__animate">{{ proofLine }}</p>
  </div>

  <div class="hero__visual hero__animate" aria-hidden="true">
    <svg class="scene" viewBox="0 0 520 520" fill="none" xmlns="http://www.w3.org/2000/svg">
      <!-- backdrop -->
      <circle cx="260" cy="252" r="212" fill="#eeeeff" />
      <circle cx="260" cy="252" r="238" stroke="#e5e7eb" stroke-width="1.5" stroke-dasharray="2 10" />

      <!-- clouds, back layer -->
      <g class="scene__clouds-back">
        <g opacity="0.95">
          <ellipse cx="112" cy="128" rx="46" ry="18" fill="#ffffff" />
          <ellipse cx="146" cy="116" rx="30" ry="14" fill="#ffffff" />
          <ellipse cx="84" cy="118" rx="24" ry="12" fill="#ffffff" />
        </g>
        <g opacity="0.9">
          <ellipse cx="412" cy="182" rx="38" ry="15" fill="#ffffff" />
          <ellipse cx="438" cy="172" rx="22" ry="11" fill="#ffffff" />
        </g>
      </g>

      <!-- floating island -->
      <ellipse class="scene__shadow" cx="260" cy="474" rx="104" ry="14" fill="#1a1a2e" opacity="0.10" />
      <g class="scene__island">
        <!-- rock mass -->
        <path d="M168 322 C 172 384, 216 428, 252 438 C 262 441, 268 432, 274 420 C 296 396, 336 368, 352 322 Z" fill="#1a1a2e" />
        <path d="M206 330 C 214 376, 240 410, 258 424 C 268 408, 296 376, 310 330 Z" fill="#2d2b52" />
        <!-- dangling rocks -->
        <circle class="scene__rock scene__rock--a" cx="212" cy="458" r="10" fill="#2d2b52" />
        <circle class="scene__rock scene__rock--b" cx="304" cy="446" r="6" fill="#2d2b52" />
        <!-- grass plates -->
        <ellipse cx="260" cy="318" rx="106" ry="27" fill="#5a50f0" />
        <ellipse cx="260" cy="312" rx="106" ry="26" fill="#7b73ff" />
        <ellipse cx="248" cy="306" rx="72" ry="16" fill="#948dff" opacity="0.55" />

        <!-- trees -->
        <g class="scene__tree">
          <rect x="196" y="242" width="7" height="64" rx="3.5" fill="#1a1a2e" />
          <circle cx="200" cy="238" r="24" fill="#6c63ff" />
          <circle cx="200" cy="214" r="17" fill="#6c63ff" />
          <circle cx="200" cy="196" r="11" fill="#8f88ff" />
          <circle cx="192" cy="234" r="8" fill="#5a50f0" />
        </g>
        <g class="scene__tree scene__tree--small">
          <rect x="160" y="266" width="5.5" height="42" rx="2.75" fill="#1a1a2e" />
          <circle cx="163" cy="262" r="16" fill="#8f88ff" />
          <circle cx="163" cy="246" r="10" fill="#6c63ff" />
        </g>

        <!-- meditating figure -->
        <g class="scene__character">
          <circle cx="308" cy="238" r="52" fill="#eeeeff" opacity="0.85" />
          <circle class="scene__pulse" cx="308" cy="238" r="56" stroke="#6c63ff" stroke-width="1.5" />
          <!-- crossed legs -->
          <ellipse cx="308" cy="284" rx="35" ry="12" fill="#2d2b52" />
          <!-- torso -->
          <path d="M282 284 C 280 250, 288 236, 308 236 C 328 236, 336 250, 334 284 Z" fill="#1a1a2e" />
          <!-- hands resting on knees -->
          <circle cx="279" cy="277" r="5.5" fill="#2d2b52" />
          <circle cx="337" cy="277" r="5.5" fill="#2d2b52" />
          <!-- head -->
          <circle cx="308" cy="215" r="17" fill="#1a1a2e" />
          <!-- sparks -->
          <rect class="scene__spark scene__spark--a" x="258" y="192" width="9" height="9" rx="2" fill="#6c63ff" transform="rotate(45 262.5 196.5)" />
          <rect class="scene__spark scene__spark--b" x="354" y="216" width="7" height="7" rx="2" fill="#8f88ff" transform="rotate(45 357.5 219.5)" />
        </g>
      </g>

      <!-- cloud, front layer -->
      <g class="scene__clouds-front" opacity="0.97">
        <ellipse cx="142" cy="392" rx="42" ry="16" fill="#ffffff" />
        <ellipse cx="172" cy="382" rx="26" ry="12" fill="#ffffff" />
      </g>
    </svg>
  </div>
</section>
