<section class="hero" id="hero" [appSectionAnchor]="'hero'">
  <!-- The Singularity: ambient WebGL scene, feathered into the paper. tiltDeg is the one knob. -->
  <div class="hero__space" aria-hidden="true">
    <app-black-hole [tiltDeg]="25" />
  </div>

  <div class="hero__copy">
    <p class="hero__greeting hero__animate">{{ greeting }}</p>
    <h1 class="hero__name hero__animate">
      {{ firstName }}<br />
      <em class="accent-word">{{ lastName }}</em>
    </h1>

    <p class="hero__role hero__animate">{{ role }}</p>

    <p class="hero__tagline hero__animate">{{ tagline }}</p>

    <div class="hero__actions hero__animate">
      <a class="button-primary" [href]="resume.url" [attr.download]="resume.fileName">
        <svg
          viewBox="0 0 24 24"
          width="18"
          height="18"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
          aria-hidden="true"
        >
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
          <path d="m7 10 5 5 5-5" />
          <path d="M12 15V3" />
        </svg>
        {{ resume.label }}
      </a>
      <button type="button" class="button-secondary" (click)="scrollTo('contact')">
        Get in touch
      </button>
    </div>

    <p class="hero__proof mono-label hero__animate">{{ proofLine }}</p>
  </div>
</section>
