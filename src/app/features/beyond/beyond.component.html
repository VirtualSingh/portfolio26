<section class="beyond section-block" id="beyond" [appSectionAnchor]="'beyond'">
  <div class="section-shell">
    <div class="beyond__inner">
      <div appScrollReveal>
        <app-section-header
          [titleStart]="content.titleStart"
          [accentWord]="content.accentWord"
          [description]="content.description"
        />
        <p class="beyond__extended">{{ content.extended }}</p>

        <ul class="beyond__hobbies">
          @for (item of content.hobbies; track item.label) {
            <li class="beyond__chip">
              @switch (item.icon) {
                @case ('camera') {
                  <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/>
                    <circle cx="12" cy="13" r="3"/>
                  </svg>
                }
                @case ('music') {
                  <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <path d="M9 18V5l12-2v13"/>
                    <circle cx="6" cy="18" r="3"/>
                    <circle cx="18" cy="16" r="3"/>
                  </svg>
                }
                @case ('pen') {
                  <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <path d="M12 19l7-7 3 3-7 7-3-3z"/>
                    <path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"/>
                    <path d="M2 2l7.586 7.586"/>
                    <circle cx="11" cy="11" r="2"/>
                  </svg>
                }
                @case ('compass') {
                  <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <circle cx="12" cy="12" r="10"/>
                    <path d="m16.24 7.76-2.12 6.36-6.36 2.12 2.12-6.36 6.36-2.12z"/>
                  </svg>
                }
              }
              <span>{{ item.label }}</span>
            </li>
          }
        </ul>
      </div>

      <!-- The Night Garden: a code-drawn dusk scene. Decorative; all real content lives in the copy column. -->
      <figure class="beyond__scene" appScrollReveal [revealDelay]="120">
        <svg viewBox="0 0 360 300" role="img" aria-hidden="true" focusable="false">
          <defs>
            <filter id="beyond-glow" x="-80%" y="-80%" width="260%" height="260%">
              <feGaussianBlur stdDeviation="7" />
            </filter>
          </defs>

          <!-- Stars -->
          <g class="garden__stars" fill="#8f88ff">
            <circle cx="42" cy="42" r="1.2" />
            <circle cx="92" cy="26" r="1" />
            <circle cx="142" cy="56" r="1.4" />
            <circle cx="212" cy="32" r="1.1" />
            <circle cx="252" cy="72" r="1" />
            <circle cx="322" cy="44" r="1.3" />
            <circle cx="302" cy="122" r="1" />
            <circle cx="62" cy="102" r="1.1" />
          </g>

          <!-- Dotted moon ring — the same ring language as the hero's Ascent scene -->
          <circle cx="294" cy="64" r="26" fill="none" stroke="#8f88ff" stroke-width="1.5" stroke-dasharray="2 6" opacity="0.55" />

          <!-- Ground -->
          <ellipse cx="180" cy="292" rx="156" ry="10" fill="#232342" />

          <!-- Grass -->
          <g fill="none" stroke="#2d2b52" stroke-width="3" stroke-linecap="round">
            <path d="M60 290 C 58 260, 66 240, 78 226" />
            <path d="M85 290 C 84 262, 90 248, 88 232" />
            <path d="M110 290 C 112 255, 104 235, 96 220" />
            <path d="M150 290 C 148 270, 154 260, 152 250" />
            <path d="M210 290 C 212 268, 206 258, 208 248" />
            <path d="M250 290 C 252 258, 262 240, 272 228" />
            <path d="M275 290 C 274 260, 268 244, 258 230" />
            <path d="M300 290 C 302 262, 310 250, 318 240" />
          </g>

          <!-- Flowers: stem + glowing head; each group sways from its base -->
          <g class="garden__flower">
            <path d="M130 290 C 128 240, 134 210, 130 186" fill="none" stroke="#2d2b52" stroke-width="3" stroke-linecap="round" />
            <path d="M130 252 C 118 246, 112 236, 114 226 C 124 232, 129 242, 130 252 Z" fill="#2d2b52" />
            <circle cx="130" cy="178" r="19" fill="#6c63ff" opacity="0.3" filter="url(#beyond-glow)" />
            <ellipse cx="130" cy="169" rx="4.5" ry="10" fill="#948dff" />
            <ellipse cx="130" cy="169" rx="4.5" ry="10" fill="#948dff" transform="rotate(72 130 178)" />
            <ellipse cx="130" cy="169" rx="4.5" ry="10" fill="#948dff" transform="rotate(144 130 178)" />
            <ellipse cx="130" cy="169" rx="4.5" ry="10" fill="#948dff" transform="rotate(216 130 178)" />
            <ellipse cx="130" cy="169" rx="4.5" ry="10" fill="#948dff" transform="rotate(288 130 178)" />
            <circle cx="130" cy="178" r="4.5" fill="#eeeeff" />
          </g>

          <g class="garden__flower garden__flower--tall">
            <path d="M180 290 C 182 230, 176 180, 180 140" fill="none" stroke="#2d2b52" stroke-width="3" stroke-linecap="round" />
            <path d="M179 236 C 192 230, 198 219, 196 208 C 185 215, 180 226, 179 236 Z" fill="#2d2b52" />
            <circle cx="180" cy="131" r="22" fill="#6c63ff" opacity="0.32" filter="url(#beyond-glow)" />
            <ellipse cx="180" cy="120" rx="5" ry="12" fill="#948dff" />
            <ellipse cx="180" cy="120" rx="5" ry="12" fill="#948dff" transform="rotate(72 180 131)" />
            <ellipse cx="180" cy="120" rx="5" ry="12" fill="#948dff" transform="rotate(144 180 131)" />
            <ellipse cx="180" cy="120" rx="5" ry="12" fill="#948dff" transform="rotate(216 180 131)" />
            <ellipse cx="180" cy="120" rx="5" ry="12" fill="#948dff" transform="rotate(288 180 131)" />
            <circle cx="180" cy="131" r="5" fill="#eeeeff" />
          </g>

          <g class="garden__flower garden__flower--late">
            <path d="M232 290 C 234 246, 228 216, 232 196" fill="none" stroke="#2d2b52" stroke-width="3" stroke-linecap="round" />
            <circle cx="232" cy="188" r="17" fill="#6c63ff" opacity="0.3" filter="url(#beyond-glow)" />
            <ellipse cx="232" cy="180" rx="4" ry="9" fill="#948dff" />
            <ellipse cx="232" cy="180" rx="4" ry="9" fill="#948dff" transform="rotate(72 232 188)" />
            <ellipse cx="232" cy="180" rx="4" ry="9" fill="#948dff" transform="rotate(144 232 188)" />
            <ellipse cx="232" cy="180" rx="4" ry="9" fill="#948dff" transform="rotate(216 232 188)" />
            <ellipse cx="232" cy="180" rx="4" ry="9" fill="#948dff" transform="rotate(288 232 188)" />
            <circle cx="232" cy="188" r="4" fill="#eeeeff" />
          </g>

          <!-- Fireflies -->
          <g class="garden__firefly">
            <circle cx="95" cy="160" r="5" fill="#6c63ff" opacity="0.25" />
            <circle cx="95" cy="160" r="1.8" fill="#eeeeff" />
          </g>
          <g class="garden__firefly garden__firefly--slow">
            <circle cx="152" cy="112" r="5" fill="#6c63ff" opacity="0.25" />
            <circle cx="152" cy="112" r="1.8" fill="#eeeeff" />
          </g>
          <g class="garden__firefly garden__firefly--late">
            <circle cx="218" cy="98" r="5" fill="#6c63ff" opacity="0.25" />
            <circle cx="218" cy="98" r="1.8" fill="#eeeeff" />
          </g>
          <g class="garden__firefly garden__firefly--slow">
            <circle cx="268" cy="152" r="5" fill="#6c63ff" opacity="0.25" />
            <circle cx="268" cy="152" r="1.8" fill="#eeeeff" />
          </g>
          <g class="garden__firefly garden__firefly--late">
            <circle cx="118" cy="92" r="4" fill="#6c63ff" opacity="0.22" />
            <circle cx="118" cy="92" r="1.5" fill="#eeeeff" />
          </g>
        </svg>
        <figcaption class="beyond__scene-caption mono-label">{{ content.sceneCaption }}</figcaption>
      </figure>
    </div>
  </div>
</section>
