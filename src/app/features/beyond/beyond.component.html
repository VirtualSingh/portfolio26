<section class="beyond section-block" id="beyond" [appSectionAnchor]="'beyond'">
  <div class="section-shell">
    <div class="beyond__inner">
      <div appScrollReveal>
        <app-section-header
          [titleStart]="content.titleStart"
          [accentWord]="content.accentWord"
          [description]="content.description"
        />
        <p class="beyond__extended">{{ content.extended }}</p>

        <ul class="beyond__hobbies">
          @for (item of content.hobbies; track item.label) {
            <li class="beyond__chip">
              @switch (item.icon) {
                @case ('camera') {
                  <svg
                    viewBox="0 0 24 24"
                    width="16"
                    height="16"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    aria-hidden="true"
                  >
                    <path
                      d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"
                    />
                    <circle cx="12" cy="13" r="3" />
                  </svg>
                }
                @case ('music') {
                  <svg
                    viewBox="0 0 24 24"
                    width="16"
                    height="16"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    aria-hidden="true"
                  >
                    <path d="M9 18V5l12-2v13" />
                    <circle cx="6" cy="18" r="3" />
                    <circle cx="18" cy="16" r="3" />
                  </svg>
                }
                @case ('pen') {
                  <svg
                    viewBox="0 0 24 24"
                    width="16"
                    height="16"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    aria-hidden="true"
                  >
                    <path d="M12 19l7-7 3 3-7 7-3-3z" />
                    <path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z" />
                    <path d="M2 2l7.586 7.586" />
                    <circle cx="11" cy="11" r="2" />
                  </svg>
                }
                @case ('compass') {
                  <svg
                    viewBox="0 0 24 24"
                    width="16"
                    height="16"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    aria-hidden="true"
                  >
                    <circle cx="12" cy="12" r="10" />
                    <path d="m16.24 7.76-2.12 6.36-6.36 2.12 2.12-6.36 6.36-2.12z" />
                  </svg>
                }
              }
              <span>{{ item.label }}</span>
            </li>
          }
        </ul>
      </div>

      <!-- The Night Garden: blooming CSS flowers — divs, gradients, and keyframes only.
           Decorative; all real content lives in the copy column. -->
      <figure class="beyond__scene" appScrollReveal [revealDelay]="120">
        <div class="garden" aria-hidden="true">
          <div class="garden__stars"></div>
          <div class="garden__moon"></div>
          <div class="garden__ground"></div>

          @for (sprout of foliage; track sprout) {
            <div class="garden__sprout garden__sprout--{{ sprout }}">
              <div class="garden__leaf"></div>
            </div>
          }

          @for (flower of flowers; track flower) {
            <div class="flower flower--{{ flower }}">
              <div class="flower__line">
                <div class="flower__stem-leaf flower__stem-leaf--r"></div>
                <div class="flower__stem-leaf flower__stem-leaf--l"></div>
              </div>
              <div class="flower__head">
                @for (petal of petals; track petal) {
                  <div class="flower__petal flower__petal--{{ petal }}"></div>
                }
                <div class="flower__center"></div>
                @for (light of lights; track light) {
                  <div class="flower__light flower__light--{{ light }}"></div>
                }
              </div>
            </div>
          }
        </div>
        <figcaption class="beyond__scene-caption mono-label">{{ content.sceneCaption }}</figcaption>
      </figure>
    </div>
  </div>
</section>
