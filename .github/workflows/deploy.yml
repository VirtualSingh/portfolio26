# Builds the prerendered site and force-pushes it to the gh-pages branch on
# every push to main. Pages serves that branch (auto-enabled when the branch
# first appeared) — the workflow-source model was not usable here because
# GITHUB_TOKEN lacks the admin right to create the Pages site.
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Run the content-config contract spec
        run: npx jest

      - name: Build (prerendered, served from the custom-domain root)
        run: npx ng build

      - name: Prepare Pages payload
        run: |
          cd dist/portfolio/browser
          cp index.html 404.html            # direct hits on unknown paths fall back to the shell
          touch .nojekyll                    # serve files as-is, no Jekyll pass
          echo 'pushpendrasingh.dev' > CNAME # keeps the custom domain across force-pushes

      - name: Push to gh-pages
        run: |
          cd dist/portfolio/browser
          git init -b gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Deploy ${GITHUB_SHA::7}"
          git push -f "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" gh-pages
